name: HTML / CSS Validator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML (Nu HTML Checker)
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          # Exclude generated/internal files
          extra: "--ignore-re 'Trailing slash on void elements' --skip-non-html"
          css: false

  validate-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Stylelint
        run: npm install --save-dev stylelint stylelint-config-recommended

      - name: Write Stylelint config
        run: |
          cat > .stylelintrc.json <<'EOF'
          {
            "extends": "stylelint-config-recommended",
            "rules": {
              "no-descending-specificity": null
            }
          }
          EOF

      - name: Run Stylelint
        run: npx stylelint "style.css" --formatter compact
